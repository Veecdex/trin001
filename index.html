<!DOCTYPE html>
<html>
<head>
  <title>Wiesel Calls</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
  justify-content: center;
  padding-top: 50px;
}

.app {
  width: 400px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

.user {
  background: #1e1e1e;
  padding: 10px;
  margin: 5px 0;
  display: flex;
  justify-content: space-between;
}
  </style>
</head>
<body>

<div class="app">

  <h1>Wiesel Calls</h1>

  <div id="loginBox">
    <input id="name" placeholder="Enter your name" />
    <button onclick="goOnline()">Go Online</button>
  </div>

  <h3>Online Users</h3>
  <div id="users"></div>

</div>

<script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.js"></script>
<script src="app.js"></script>
<script>
  let identity = "";
let room;

const API = "https://old-fire-fc1a.victorpalmtrees001.workers.dev";

async function goOnline() {
  identity = document.getElementById("name").value;

  await fetch(API + "/online", {
    method: "POST",
    body: JSON.stringify({ identity })
  });

  setInterval(loadUsers, 3000);
  loadUsers();
}

async function loadUsers() {
  const res = await fetch(API + "/users");
  const users = await res.json();

  const box = document.getElementById("users");
  box.innerHTML = "";

  users.forEach(u => {
    if (u === identity) return;

    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <span>${u}</span>
      <button onclick="callUser('${u}')">Call</button>
    `;

    box.appendChild(div);
  });
}

async function callUser(target) {
  const roomName = [identity, target].sort().join("-");

  const res = await fetch(API + "/token", {
    method: "POST",
    body: JSON.stringify({
      identity,
      room: roomName
    })
  });

  const { token } = await res.json();

  room = new LiveKit.Room();

  await room.connect(
    "LIVEKIT_URL=wss://lk-test-dth3emt0.livekit.cloud",
    token
  );

  const tracks = await LiveKit.createLocalTracks({
    audio: true,
    video: false
  });

  tracks.forEach(t => room.localParticipant.publishTrack(t));

  room.on("trackSubscribed", (track) => {
    const el = track.attach();
    document.body.appendChild(el);
  });

  alert("Calling " + target);
}
</script>
</body>
</html>
