      <!-- NAV LINKS -->

    <!-- BOTTOM LINK (SPECIAL) -->
    <div class="p-3 border-t border-slate-100">

      <a class="flex items-center justify-between px-4 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg hover:opacity-90 transition">
        <div class="flex items-center gap-3">

        </div>
        <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
      </a>

    </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden">

    <!-- TOP BAR -->
    <header class="h-20 flex-shrink-0 px-6 flex items-center justify-between border-b border-slate-200 bg-white z-20">
    <!-- LEFT -->
<div class="hidden sm:flex items-center gap-3">
    <div class="leading-tight">
      <h2 class="text-sm tracking-widest text-slate-500">
        OS FOR MODERN COMMERCE
      </h2>
    </div>
  </div>

      <!-- RIGHT -->
      <div class="flex items-center gap-4">

        <button class="relative p-2 rounded-xl hover:bg-slate-100 transition">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <div class="flex items-center gap-3 pl-3 border-l border-slate-200">
          <img
            src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"

          <div class="leading-tight">

          </div>
        </div>

      </div>

    <!-- MAIN -->
    <main id="mainContent" class="flex-1 bg-slate-50 overflow-hidden relative">

        <div class="h-full flex bg-white md:rounded-2xl border border-slate-200 overflow-hidden">
      
          <!-- CHAT LIST -->
          <div id="chatList"
            class="w-full md:w-80 border-r border-slate-200 flex flex-col bg-white">
      
            <div class="p-3 border-b">
              <div class="relative">
            
                <i data-lucide="search"
                  class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400">
                </i>
            
                <input
                  id="searchInput"
                  type="text"
                  placeholder="Search customers..."
                  class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-slate-100 text-sm outline-none"
                >
            
              </div>
            </div>
      
            <div id="chatListItems" class="flex-1 overflow-y-auto"></div>
          </div>
          <!-- CHAT PANEL (DESKTOP INLINE + MOBILE SLIDE OVERLAY) -->
          <div id="chatPanel"
            class="absolute md:relative inset-0 md:inset-auto
                   flex flex-col flex-1 bg-white
                   translate-x-full md:translate-x-0
                   transition-transform duration-300 ease-in-out">
      
            <!-- HEADER -->
            <div class="h-14 md:h-16 flex items-center gap-3 px-4 border-b bg-white">
      
              <div id="chatAvatar"
              class="w-9 h-9 rounded-full text-white flex items-center justify-center text-sm font-semibold">
             </div>
      
              <div class="flex-1">
                <p class="text-sm font-semibold" id="chatName">Select chat</p>
                <p class="text-[11px] text-green-500">Online</p>
              </div>
      
              <!-- MOBILE CLOSE -->
              <button onclick="closeChat()"
                class="md:hidden w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500">
                ✕
              </button>
      
            </div>
      
            <!-- MESSAGES -->
            <div id="messages" class="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50"></div>
      
            <!-- INPUT -->
            <div class="p-3 border-t bg-white flex gap-2">
      
              <input placeholder="Message..."
                class="flex-1 px-3 py-2.5 rounded-xl bg-slate-100 text-sm outline-none">
      
              <button class="px-4 py-2.5 bg-indigo-600 text-white rounded-xl text-sm">
                Send
              </button>
      
            </div>
      
          </div>
      
        </div>
      
      </main>
<script>
  lucide.createIcons();
</script>
<script>
    function openChat(name, initials) {
      document.getElementById("chatName").innerText = name;
  
      const panel = document.getElementById("chatPanel");
  
      // mobile slide in
      panel.classList.remove("translate-x-full");
      panel.classList.add("translate-x-0");
    }
  
    function closeChat() {
      const panel = document.getElementById("chatPanel");
  
      panel.classList.add("translate-x-full");
      panel.classList.remove("translate-x-0");
    }
  </script>
<script>
    lucide.createIcons();
  
    // =========================
    // DATA (your backend later can replace this)
    // =========================
    const chats = [
{
  id:1,
  name:"Sarah Johnson",
  lastMessage:"Is this still available?",
  time:"2m",
  color:"bg-pink-500",
  messages:[
    {type:"user",text:"Hello, is it available?"},
    {type:"me",text:"Yes, it is available."}
  ]
},

{
  id:2,
  name:"Michael Brown",
  lastMessage:"Can I get discount?",
  time:"10m",
  color:"bg-emerald-500",
  messages:[
    {type:"user",text:"Can I get discount?"},
    {type:"me",text:"Yes, for bulk orders 👍"}
  ]
},

{
  id:3,
  name:"Emily Carter",
  lastMessage:"Order confirmed?",
  time:"1h",
  color:"bg-orange-500",
  messages:[
    {type:"user",text:"Order confirmed?"},
    {type:"me",text:"Yes, your order is confirmed."}
  ]
}
];
  
    let activeChat = null;
  
    // =========================
    // RENDER CHAT LIST
    // =========================
    function renderChats(filteredChats = chats) {

const chatList = document.getElementById("chatListItems");

chatList.innerHTML = "";

if(filteredChats.length === 0){

  chatList.innerHTML = `
    <div class="p-6 text-center text-slate-400 text-sm">
      No customer found
    </div>
  `;

  return;
}

filteredChats.forEach(chat => {

  const div = document.createElement("div");

  div.className =
    "flex items-center gap-3 p-3 cursor-pointer hover:bg-slate-50";

  div.onclick = () => openChat(chat.id);

  div.innerHTML = `
    <div class="w-10 h-10 rounded-full ${chat.color}
    text-white flex items-center justify-center font-semibold text-sm">
      ${getInitials(chat.name)}
    </div>

    <div class="flex-1 min-w-0">
      <p class="font-medium text-sm truncate">${chat.name}</p>
      <p class="text-xs text-slate-500 truncate">${chat.lastMessage}</p>
    </div>

    <span class="text-[10px] text-slate-400">${chat.time}</span>
  `;

  chatList.appendChild(div);

});

}
    // =========================
    // OPEN CHAT
    // =========================
    function openChat(chatId){

activeChat = chats.find(c => c.id === chatId);

document.getElementById("chatName").innerText =
  activeChat.name;

const avatar = document.getElementById("chatAvatar");

avatar.className =
`w-9 h-9 rounded-full ${activeChat.color}
text-white flex items-center justify-center text-sm font-semibold`;

avatar.textContent =
  getInitials(activeChat.name);

renderMessages();

const panel = document.getElementById("chatPanel");

panel.classList.remove("translate-x-full");
panel.classList.add("translate-x-0");
}
  
    // =========================
    // RENDER MESSAGES
    // =========================
    function renderMessages() {
      const box = document.getElementById("messages");
      box.innerHTML = "";
  
      activeChat.messages.forEach(msg => {
        const wrapper = document.createElement("div");
  
        if (msg.type === "me") {
          wrapper.className = "flex justify-end";
          wrapper.innerHTML = `
            <div class="max-w-[75%] text-sm bg-indigo-600 text-white px-3 py-2 rounded-2xl">
              ${msg.text}
            </div>
          `;
        } else {
          wrapper.className = "flex";
          wrapper.innerHTML = `
            <div class="max-w-[75%] text-sm bg-white px-3 py-2 rounded-2xl shadow-sm">
              ${msg.text}
            </div>
          `;
        }
  
        box.appendChild(wrapper);
      });
    }
  
    // =========================
    // CLOSE CHAT
    // =========================
    function closeChat() {
      const panel = document.getElementById("chatPanel");
      panel.classList.add("translate-x-full");
      panel.classList.remove("translate-x-0");
    }
  
    // INIT
    renderChats();

    function getInitials(name){
  return name
    .split(" ")
    .map(word => word[0])
    .join("")
    .toUpperCase();
}
renderChats();

if(window.innerWidth >= 768){
  openChat(chats[0].id);
}
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function () {

  const value = this.value.toLowerCase().trim();

  const filteredChats = chats.filter(chat =>
    chat.name.toLowerCase().includes(value)
  );

  renderChats(filteredChats);

});
renderChats();

if(window.innerWidth >= 768){
  openChat(chats[0].id);
}
lucide.createIcons();
  </script>
</body>
