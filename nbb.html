<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voice Chat App</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.chat-container {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    background: #111827;
    text-align: center;
    font-weight: bold;
}

.messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    background: #1f2937;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
}

.msg audio {
    width: 100%;
    margin-top: 5px;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #111827;
    gap: 5px;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.send-btn {
    background: #22c55e;
    color: white;
}

.record-btn {
    background: #ef4444;
    color: white;
}

.stop-btn {
    background: #f59e0b;
    color: white;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">Voice Chat App</div>

    <div id="messages" class="messages"></div>

    <div class="input-area">
        <input id="textInput" placeholder="Type a message..." />
        <button class="send-btn" onclick="sendText()">Send</button>
    </div>

    <div class="input-area">
        <button class="record-btn" onclick="startRecording()">Record</button>
        <button class="stop-btn" onclick="stopRecording()">Stop</button>
    </div>

</div>

<script>
let messages = JSON.parse(localStorage.getItem("chatMessages")) || [];
let mediaRecorder;
let audioChunks = [];

// Load existing messages
renderMessages();

// TEXT MESSAGE
function sendText() {
    const input = document.getElementById("textInput");
    const text = input.value.trim();
    if (!text) return;

    messages.push({
        type: "text",
        data: text,
        time: Date.now()
    });

    input.value = "";
    saveAndRender();
}

async function startRecording() {

try {

    if (!navigator.mediaDevices) {
        alert("mediaDevices is not supported.");
        return;
    }

    if (!window.MediaRecorder) {
        alert("MediaRecorder is not supported by this browser.");
        return;
    }

    const stream = await navigator.mediaDevices.getUserMedia({
        audio: true
    });

    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) {
            audioChunks.push(e.data);
        }
    };

    mediaRecorder.onstop = () => {

        const audioBlob = new Blob(audioChunks, {
            type: mediaRecorder.mimeType
        });

        const reader = new FileReader();

        reader.onloadend = () => {

            messages.push({
                type: "audio",
                data: reader.result,
                time: Date.now()
            });

            saveAndRender();
        };

        reader.readAsDataURL(audioBlob);

        stream.getTracks().forEach(track => track.stop());
    };

    mediaRecorder.start();

}
catch (err) {

    console.error(err);

    alert("Recording failed:\n" + err.message);

}

}

// STOP RECORDING
function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
}

// SAVE + RENDER
function saveAndRender() {
    localStorage.setItem("chatMessages", JSON.stringify(messages));
    renderMessages();
}

// RENDER UI
function renderMessages() {
    const box = document.getElementById("messages");
    box.innerHTML = "";

    messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "msg";

        if (msg.type === "text") {
            div.innerHTML = `<div>${msg.data}</div>`;
        }

        if (msg.type === "audio") {
            div.innerHTML = `
                <audio controls src="${msg.data}"></audio>
            `;
        }

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
