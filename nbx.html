<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VN Chat</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6fb;
}

/* APP */
.app{
    height:100vh;
    display:flex;
    flex-direction:column;
    max-width:500px;
    margin:auto;
    background:white;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:white;
    border-bottom:1px solid #eee;
}

.header .left{
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:35px;
    height:35px;
    border-radius:50%;
    background:linear-gradient(45deg,#4f46e5,#06b6d4);
}

/* CHAT AREA */
.chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* BUBBLES */
.msg{
    max-width:75%;
    padding:10px 12px;
    border-radius:15px;
    font-size:14px;
    animation:pop .2s ease;
}

@keyframes pop{
    from{transform:scale(.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

.me{
    align-self:flex-end;
    background:#4f46e5;
    color:white;
    border-bottom-right-radius:5px;
}

.them{
    align-self:flex-start;
    background:#eef2ff;
    color:#111;
    border-bottom-left-radius:5px;
}

/* INPUT BAR */
.input{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-top:1px solid #eee;
    background:white;
}

.input input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ddd;
    outline:none;
}

.icon-btn{
    width:40px;
    height:40px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    border:none;
    cursor:pointer;
}

.mic{
    background:#ef4444;
    color:white;
}

.send{
    background:#4f46e5;
    color:white;
}

/* RECORDING UI */
.recording{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    display:none;
    font-size:12px;
}
.recording{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    display:none;
    font-size:12px;
    gap:10px;
    align-items:center;
}

.dot{
    width:8px;
    height:8px;
    background:red;
    border-radius:50%;
    animation:pulse 1s infinite;
    display:inline-block;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:1;}
    50%{transform:scale(1.6);opacity:0.4;}
    100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="left">
            <div class="avatar"></div>
            <div>
                <div style="font-weight:bold">Wiesel Store</div>
                <small style="color:green">online</small>
            </div>
        </div>

        <i class="fa fa-phone"></i>
    </div>

    <!-- CHAT -->
    <div id="chat" class="chat"></div>

    <!-- INPUT -->
    <div class="input">
        <input id="text" placeholder="Type message..." />
        <button class="icon-btn mic"
        ontouchstart="event.preventDefault(); startHold()"
        ontouchend="event.preventDefault(); stopHold()"
        onmousedown="startHold()"
        onmouseup="stopHold()">
            <i class="fa fa-microphone"></i>
        </button>

        <button class="icon-btn send" onclick="sendText()">
            <i class="fa fa-paper-plane"></i>
        </button>
    </div>

</div>

<div id="rec" class="recording">
  <span class="dot"></span>
  <span id="timer">00:00</span>
</div>
<script>
    let isRecording = false;
    let chat = JSON.parse(localStorage.getItem("chat") || "[]");
    
    let mediaRecorder;
    let audioChunks = [];
    let stream;
    
    let timerInterval;
    let seconds = 0;
    
    let holdActive = false; // 🔥 prevents double trigger
    
    /* ---------------- RENDER ---------------- */
    function render() {
        const box = document.getElementById("chat");
        box.innerHTML = "";
    
        chat.forEach(m => {
            const div = document.createElement("div");
            div.className = "msg " + (m.from === "me" ? "me" : "them");
    
            if (m.type === "text") {
                div.textContent = m.text;
            }
    
            if (m.type === "audio") {
                div.innerHTML = `
                    <audio controls src="${m.url}" style="width:200px"></audio>
                    <div style="font-size:10px;opacity:0.7;margin-top:5px">
                        🎵 ${m.size} KB
                    </div>
                `;
            }
    
            box.appendChild(div);
        });
    
        box.scrollTop = box.scrollHeight;
    }
    
    render();
    
    /* ---------------- SAVE ---------------- */
    function save() {
        localStorage.setItem("chat", JSON.stringify(chat));
        render();
    }
    
    /* ---------------- TEXT ---------------- */
    function sendText() {
        const input = document.getElementById("text");
        const value = input.value.trim();
    
        if (!value) return;
    
        chat.push({
            type: "text",
            text: value,
            from: "me"
        });
    
        input.value = "";
        save();
    }
    
    /* ---------------- RECORDING ---------------- */
    async function startRec() {
        if (isRecording) return;
    
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
    
            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    audioChunks.push(e.data);
                }
            };
    
            mediaRecorder.onstop = handleStop;
    
            mediaRecorder.start();
            isRecording = true;
    
        } catch (err) {
            console.log("Mic error:", err);
            isRecording = false;
        }
    }
    
    function stopRec() {
        if (!mediaRecorder || mediaRecorder.state !== "recording") return;
    
        try {
            mediaRecorder.stop();
        } catch (e) {
            console.log(e);
        }
    
        isRecording = false;
    }
    
    /* ---------------- HOLD CONTROL (FIXED) ---------------- */
    function startHold(e) {
        if (holdActive) return;
        holdActive = true;
    
        startRec();
        startTimer();
    }
    
    function stopHold(e) {
        if (!holdActive) return;
        holdActive = false;
    
        stopTimer();
        stopRec();
    }
    
    /* ---------------- TIMER ---------------- */
    function startTimer() {
        seconds = 0;
    
        document.getElementById("rec").style.display = "flex";
    
        clearInterval(timerInterval);
    
        timerInterval = setInterval(() => {
            seconds++;
    
            const m = String(Math.floor(seconds / 60)).padStart(2, "0");
            const s = String(seconds % 60).padStart(2, "0");
    
            document.getElementById("timer").innerText = `${m}:${s}`;
        }, 1000);
    }
    
    function stopTimer() {
        clearInterval(timerInterval);
        document.getElementById("rec").style.display = "none";
    }
    
    /* ---------------- AUDIO FINAL ---------------- */
    function handleStop() {
        try {
            if (!audioChunks.length) return;
    
            const blob = new Blob(audioChunks, { type: "audio/webm" });
    
            const reader = new FileReader();
    
            reader.onloadend = () => {
                chat.push({
                    type: "audio",
                    url: reader.result,
                    size: Math.round(blob.size / 1024),
                    from: "me"
                });
    
                save();
            };
    
            reader.readAsDataURL(blob);
    
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
    
        } catch (err) {
            console.log("Audio error:", err);
        }
    }
    </script>
</body>
</html>
