<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Business Onboarding</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <style>

    body{
      font-family: Inter, sans-serif;
      background:
      linear-gradient(
        135deg,
        #fff5f5 0%,
        #ffffff 40%,
        #fef2f2 100%
      );
    }

    .mainCard{
      box-shadow:
      0 10px 40px rgba(239,68,68,0.08);
    }

    .inputField{
      border: 1.5px solid #ececec;
      transition: all .3s ease;
    }

    .inputField:focus{
      border-color: #ef4444;
      box-shadow: 0 0 0 5px rgba(239,68,68,0.1);
      outline: none;
    }

    .uploadBox{
      border: 2px dashed #ef4444;
      transition: .3s ease;
    }

    .uploadBox:hover{
      background: rgba(239,68,68,0.03);
      transform: translateY(-2px);
    }

  </style>

</head>

<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

  <div
    class="mainCard bg-white w-full max-w-2xl rounded-[2.5rem] p-6 md:p-10">

    <!-- TOP ICON -->

    <div class="text-center mb-10">

      <div
        class="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-6">

        <i class="fa-solid fa-store text-4xl text-red-600"></i>

      </div>

      <h1
        class="text-4xl md:text-5xl font-black text-gray-900 leading-tight mb-4">

        Tell Us More
        <br>
        About Your Business

      </h1>

      <p
        class="text-gray-500 text-sm md:text-base max-w-lg mx-auto leading-relaxed">

        We’re setting up your workspace.
        Fill in a few business details to personalize your dashboard experience.

      </p>

    </div>


    <!-- FORM -->

    <form
    id="onboardingForm"
    class="space-y-7">
    
      <!-- BUSINESS LOCATION -->
    
      <div>
    
        <label
          class="block text-gray-800 font-bold mb-3">
    
          Business Location
    
        </label>
    
        <div class="relative">
    
          <i
            class="fa-solid fa-location-dot absolute left-5 top-1/2 -translate-y-1/2 text-red-500">
          </i>
    
          <input
            id="businessLocation"
            type="text"
            required
            placeholder="Example: Lagos, Nigeria"
            class="inputField w-full h-16 rounded-2xl pl-14 pr-5 text-gray-800 bg-white"
          />
    
        </div>
    
      </div>
    
    
      <!-- BUSINESS INDUSTRY -->
    
      <div>
    
        <label
          class="block text-gray-800 font-bold mb-3">
    
          Business Industry
    
        </label>
    
        <div class="relative">
    
          <i
            class="fa-solid fa-briefcase absolute left-5 top-1/2 -translate-y-1/2 text-red-500">
          </i>
    
          <input
            id="businessIndustry"
            type="text"
            required
            placeholder="Example: Fashion & Clothing"
            class="inputField w-full h-16 rounded-2xl pl-14 pr-5 text-gray-800 bg-white"
          />
    
        </div>
    
      </div>
    
    
      <!-- STORE ADDRESS -->
    
      <div>
    
        <label
          class="block text-gray-800 font-bold mb-3">
    
          Store Address
    
        </label>
    
        <div class="relative">
    
          <i
            class="fa-solid fa-shop absolute left-5 top-1/2 -translate-y-1/2 text-red-500">
          </i>
    
          <input
            id="storeAddress"
            type="text"
            required
            placeholder="Example: 15 Admiralty Way, Lekki"
            class="inputField w-full h-16 rounded-2xl pl-14 pr-5 text-gray-800 bg-white"
          />
    
        </div>
    
      </div>
    
    
      <!-- LOGO UPLOAD -->
    
      <div>
    
        <label
          class="block text-gray-800 font-bold mb-3">
    
          Upload Business Logo
    
        </label>
    
        <label
          for="logoUpload"
          class="uploadBox rounded-[2rem] p-8 flex flex-col items-center justify-center text-center cursor-pointer">
    
          <input
            id="logoUpload"
            type="file"
            accept="image/*"
            required
            class="hidden"
          />
    
          <!-- IMAGE PREVIEW -->
    
          <img
            id="previewImage"
            src=""
            class="hidden w-28 h-28 rounded-full object-cover border-4 border-red-100 mb-5"
          />
    
          <!-- DEFAULT ICON -->
    
          <div
            id="defaultUploadIcon"
            class="w-24 h-24 rounded-full bg-red-100 flex items-center justify-center mb-5">
    
            <i
              class="fa-solid fa-image text-4xl text-red-600">
            </i>
    
          </div>
    
          <h3
            id="uploadTitle"
            class="text-2xl font-extrabold text-gray-900 mb-2">
    
            Upload Your Logo
    
          </h3>
    
          <p
            id="uploadText"
            class="text-gray-500 text-sm leading-relaxed max-w-sm">
    
            Drag and drop your logo here
            or click to browse files.
            PNG or JPG recommended.
    
          </p>
    
          <!-- IMAGE INFO -->
    
          <div
            id="imageInfo"
            class="hidden mt-5 bg-red-50 rounded-2xl px-5 py-4 text-left w-full max-w-md">
    
            <div class="flex items-center gap-3 mb-2">
    
              <i class="fa-solid fa-file-image text-red-500"></i>
    
              <span
                id="imageName"
                class="font-bold text-gray-800 text-sm truncate">
              </span>
    
            </div>
    
            <p
              id="imageSize"
              class="text-gray-500 text-sm">
            </p>
    
          </div>
    
        </label>
    
      </div>
    
    
      <!-- BUTTON -->
    
      <button
        id="continueBtn"
        type="submit"
        class="w-full h-16 rounded-2xl bg-red-600 hover:bg-red-500 transition-all duration-300 text-white font-extrabold text-lg shadow-xl shadow-red-200">
    
        Continue To Dashboard
    
      </button>
    
    </form>

  </div>

</body>
<script>
let currentUser = null;
let currentToken = null;
    const logoUpload =
      document.getElementById(
        "logoUpload"
      );
    
    const previewImage =
      document.getElementById(
        "previewImage"
      );
    
    const imageInfo =
      document.getElementById(
        "imageInfo"
      );
    
    const imageName =
      document.getElementById(
        "imageName"
      );
    
    const imageSize =
      document.getElementById(
        "imageSize"
      );
    
    const defaultUploadIcon =
      document.getElementById(
        "defaultUploadIcon"
      );
    
    const uploadTitle =
      document.getElementById(
        "uploadTitle"
      );
    
    const uploadText =
      document.getElementById(
        "uploadText"
      );
      window.addEventListener(
  "DOMContentLoaded",
  async () => {

    const params =
      new URLSearchParams(
        window.location.search
      );

    const token =
      params.get("token");

    // NO TOKEN
    if (!token) {

      window.location.href =
        "login.html";

      return;

    }

    currentToken = token;

    try {

      const response =
        await fetch(
          `https://moma-api.victorpalmtrees001.workers.dev/verify-login?token=${token}`
        );

      const data =
        await response.json();

      // INVALID SESSION
      if (!data.success) {

        window.location.href =
          "login.html";

        return;

      }

      currentUser =
        data.user;

      // USER READY FOR DASHBOARD
      if (
        data.redirectTo ===
        "dashboard"
      ) {

        window.location.href =
          `dashboard.html?token=${token}`;

      }

    } catch (error) {

      console.log(error);

      window.location.href =
        "login.html";

    }

  }
);
    
    // IMAGE PREVIEW
    
    logoUpload.addEventListener(
      "change",
      (e) => {
    
        const file =
          e.target.files[0];
    
        if (!file) return;
    
        // SHOW IMAGE
    
        const reader =
          new FileReader();
    
        reader.onload = function(event){
    
          previewImage.src =
            event.target.result;
    
          previewImage.classList.remove(
            "hidden"
          );
    
          defaultUploadIcon.classList.add(
            "hidden"
          );
    
        };
    
        reader.readAsDataURL(file);
    
        // IMAGE INFO
    
        imageInfo.classList.remove(
          "hidden"
        );
    
        imageName.textContent =
          file.name;
    
        imageSize.textContent =
          `${(file.size / 1024).toFixed(1)} KB`;
    
        uploadTitle.textContent =
          "Logo Uploaded";
    
        uploadText.textContent =
          "Your business logo is ready.";
    
      }
    );
    
    
    // FORM SUBMIT

document
.getElementById(
  "onboardingForm"
)
.addEventListener(
  "submit",
  async (e) => {

    e.preventDefault();

    if (!currentUser) {

      alert("Session expired");

      return;

    }

    const continueBtn =
      document.getElementById(
        "continueBtn"
      );

    continueBtn.disabled = true;

    continueBtn.innerHTML =
      `
      <i class="fa-solid fa-spinner fa-spin"></i>
      Setting Up Dashboard...
      `;

    try {

      const file =
        logoUpload.files[0];

      if (!file) {

        alert("Please upload logo");

        return;

      }

      // =========================
      // COMPRESS IMAGE TO 50KB
      // =========================

      const compressedLogo =
        await compressImage(
          file,
          50
        );

      // =========================
      // SEND DATA
      // =========================

      const response =
        await fetch(
          "https://moma-api.victorpalmtrees001.workers.dev/complete-onboarding",
          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({

              email:
                currentUser.email,

              businessLocation:
                document.getElementById(
                  "businessLocation"
                ).value,

              businessIndustry:
                document.getElementById(
                  "businessIndustry"
                ).value,

              storeAddress:
                document.getElementById(
                  "storeAddress"
                ).value,

              businessLogo:
                compressedLogo

            })

          }
        );

      const data =
        await response.json();

      if (!response.ok) {

        alert(data.message);

        return;

      }

      // DESTROY TOKEN
      await fetch(
        `https://moma-api.victorpalmtrees001.workers.dev/logout-token?token=${currentToken}`
      );

      // GO DASHBOARD
      window.location.href =
        `dashboard.html`;

    } catch (error) {

      alert(error.message);

    } finally {

      continueBtn.disabled = false;

      continueBtn.innerHTML =
        "Continue To Dashboard";

    }

  }
);
    </script>
</html>
