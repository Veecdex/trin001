<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <title>Moma Orders</title>
</head>
<style>
  body{
    zoom: 0.85;
  }
  @media (max-width: 1190px) {

html {
  font-size: 14px ; /* 👈 scales EVERYTHING proportionally */
  
}

.max-w-6xl {
  padding-left: 0.75rem;
  padding-right: 0.75rem;
}

}
</style>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-5xl mx-auto p-4 md:p-8">
  <div class="mb-8">
    <div class="flex items-center gap-4 mb-4">
      <button onclick="window.location.href='dashboard.html'" class="w-11 h-11 rounded-2xl bg-white border border-gray-200 flex items-center justify-center shadow-sm hover:shadow-md transition">
        <i data-lucide="arrow-left"></i>
      </button>
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Orders</h1>
        <p class="text-gray-500">Track and manage all your gift card purchases</p>
      </div>
    </div>
  </div>

  <div class="grid lg:grid-cols-5 gap-6">
    <!-- Orders List -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="p-5 border-b border-gray-100">
          <h2 class="text-xl font-bold">Order History</h2>
          <p class="text-sm text-gray-500 mt-1">Select an order to view details</p>
        </div>

        <div id="ordersList" class="p-4 space-y-4 max-h-[75vh] overflow-y-auto"></div>
      </div>
    </div>

    <!-- Order Details -->
    <div class="lg:col-span-3">
      <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
        <div id="orderDetailsContainer">
          <div class="p-10 text-center">
            <div class="w-20 h-20 mx-auto mb-5 rounded-full bg-red-50 flex items-center justify-center">
              <i data-lucide="receipt" class="w-10 h-10 text-red-500"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Select an Order</h3>
            <p class="text-gray-500">Choose any order from the list to view complete details.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="pdfPreviewBox" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white w-[92%] max-w-xl rounded-3xl p-5">

    <h3 class="text-lg font-bold mb-3">Gift Card Preview</h3>

    <!-- LOADER -->
    <div id="pdfLoader" class="py-10 text-center">
      <div class="w-10 h-10 border-4 border-red-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
      <p class="text-sm text-gray-500 mt-3">Preparing your gift card...</p>
    </div>

    <!-- PDF -->
    <iframe id="pdfFrame" class="hidden w-full h-[450px] rounded-2xl border"></iframe>

    <!-- ACTIONS -->
    <div id="pdfActions" class="hidden flex gap-3 mt-4">
      <button onclick="sharePdfFile()"
      class="flex-1 bg-green-500 text-white py-2 rounded-xl text-sm">
      Share
    </button>
    </div>

  </div>
</div>
<script>
  let currentPdfUrl = null;
  const latestOrder = JSON.parse(localStorage.getItem('latestMomaOrder'));
  const savedOrders = JSON.parse(localStorage.getItem('momaOrders')) || [];

  if (latestOrder && !savedOrders.some(order => order.id === latestOrder.id)) {
    savedOrders.unshift(latestOrder);
    localStorage.setItem('momaOrders', JSON.stringify(savedOrders));
  }

  function formatCurrency(amount) {
    return new Intl.NumberFormat('en-NG', {
      style: 'currency',
      currency: 'NGN',
      minimumFractionDigits: 0
    }).format(amount).replace('NGN', '₦');
  }

  function getStatusColor(status) {
    const normalized = status.toLowerCase();
    if (normalized.includes('completed') || normalized.includes('delivered')) {
      return 'bg-green-100 text-green-700';
    }
    if (normalized.includes('processing') || normalized.includes('pending')) {
      return 'bg-yellow-100 text-yellow-700';
    }
    return 'bg-blue-100 text-blue-700';
  }

  function renderOrders() {
    const ordersList = document.getElementById('ordersList');

    if (savedOrders.length === 0) {
      ordersList.innerHTML = `
        <div class="text-center py-12">
          <div class="w-16 h-16 mx-auto rounded-full bg-gray-100 flex items-center justify-center mb-4">
            <i data-lucide="package-open" class="text-gray-400"></i>
          </div>
          <h3 class="font-bold text-lg text-gray-700">No Orders Yet</h3>
          <p class="text-gray-500 text-sm mt-1">Your purchases will appear here.</p>
        </div>
      `;
      lucide.createIcons();
      return;
    }

    ordersList.innerHTML = savedOrders.map((order, index) => `
      <button onclick="showOrder('${order.id}')" class="w-full text-left p-5 rounded-2xl border border-gray-100 hover:border-red-200 hover:bg-red-50 transition group ${index === 0 ? 'bg-red-50 border-red-200' : 'bg-white'}">
        <div class="flex items-start justify-between mb-3">
          <div>
            <p class="font-bold text-gray-900">${order.id}</p>
            <p class="text-sm text-gray-500">${order.date}</p>
          </div>
          <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusColor(order.status)}">${order.status}</span>
        </div>

        <div class="flex items-center justify-between">
          <p class="text-2xl font-bold text-red-500">${formatCurrency(order.amount)}</p>
          <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400 group-hover:text-red-500"></i>
        </div>
      </button>
    `).join('');

    lucide.createIcons();
  }
  function generateGiftCardPDF(item, product, order) {
  const { jsPDF } = window.jspdf;

  const doc = new jsPDF({
    orientation: "landscape",
    unit: "mm",
    format: [85.6, 53.98]
  });

  // 🔥 BUSINESS DATA (later from Firebase)
  const business = {
    name: "Moma Restaurant",
    industry: "restaurant",
    address: "12 Allen Avenue, Lagos",
  };

  const value = `${product.value.toLocaleString()} NGN`;

  // 🎨 COLORS BASED ON INDUSTRY
  let bg = [30, 30, 30];
  let accent = [255, 99, 71];

  if (business.industry === "restaurant") {
    bg = [92, 35, 12];     // deep brown
    accent = [255, 140, 0]; // orange
  }

  // =========================
  // 🎴 FRONT CARD
  // =========================

  // Background
  doc.setFillColor(...bg);
  doc.roundedRect(0, 0, 85.6, 53.98, 4, 4, "F");

  // Accent Glow Shape (top right)
  doc.setFillColor(...accent);
  doc.circle(72, 12, 9, "F");

  // BUSINESS NAME
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "bold");
  doc.setFontSize(9);
  doc.text(business.name.toUpperCase(), 6, 8);

  // GIFT LABEL
  doc.setFontSize(7);
  doc.setTextColor(230, 230, 230);
  doc.text("GIFT CARD", 6, 13);

  // VALUE (MAIN FOCUS)
  doc.setFontSize(22);
  doc.setTextColor(255, 255, 255);
  doc.text(value, 6, 28);

  // TAGLINE
  doc.setFontSize(7);
  doc.setTextColor(255, 210, 180);
  doc.text(" Enjoy premium meals & experiences", 6, 36);

  // SUBTEXT
  doc.setFontSize(6);
  doc.setTextColor(200, 200, 200);
  doc.text("Valid for curated dining & special menus", 6, 41);

  // FOOTER
  doc.setFontSize(6);
  doc.setTextColor(180, 180, 180);
  doc.text("Powered by MOMA", 6, 50);

  // =========================
  // 🔁 BACK CARD
  // =========================
  doc.addPage();

  // Background
  doc.setFillColor(18, 18, 18);
  doc.roundedRect(0, 0, 85.6, 53.98, 4, 4, "F");

  // STRIP DESIGN
  doc.setFillColor(40, 40, 40);
  doc.rect(0, 0, 85.6, 10, "F");

  // TITLE
  doc.setFontSize(8);
  doc.setTextColor(255, 255, 255);
  doc.text("Gift Card Details", 6, 7);

  // CODE LABEL
  doc.setFontSize(6);
  doc.setTextColor(200, 200, 200);
  doc.text("Gift Code", 6, 16);

  // CODE VALUE
  doc.setFontSize(11);
  doc.setTextColor(255, 200, 0);
  doc.setFont("courier", "bold"); // 🔥 looks like real code
  doc.text(item.instanceId, 6, 21);

  // RESET FONT
  doc.setFont("helvetica", "normal");

  // INSTRUCTIONS
  doc.setFontSize(6);
  doc.setTextColor(220, 220, 220);

  doc.text("To redeem:", 6, 30);
  doc.text(`Visit: ${business.address}`, 6, 34);
  doc.text("Present at the counter", 6, 38);

  // EXPIRY
  doc.setTextColor(255, 120, 120);
  doc.text("Expires 30 days after purchase", 6, 43);

  // WARNING
  doc.setTextColor(180, 180, 180);
  doc.text("This is a virtual gift card. Redeem at store location", 6, 47);

  // BRAND FOOTER
  doc.setFontSize(7);
  doc.setTextColor(255, 255, 255);
  doc.text("MOMA Gift Card Company", 6, 52);

  // EXPORT
  const blob = doc.output("blob");
  return URL.createObjectURL(blob);
}
  function showOrder(orderId) {
  const order = savedOrders.find(item => item.id === orderId);
  if (!order) return;

  const products = [
    { id: 1, value: 2000, orderPrice: 50 },
    { id: 2, value: 5000, orderPrice: 125 },
    { id: 3, value: 10000, orderPrice: 250 },
    { id: 4, value: 15000, orderPrice: 375 },
    { id: 5, value: 20000, orderPrice: 500 },
    { id: 6, value: 50000, orderPrice: 1200 }
  ];

  const itemsHTML = (order.items && order.items.length > 0)
  ? order.items.map(item => {
      const product = products.find(p => p.id == item.id);
      if (!product) return '';

      // ✅ FUTURE-READY FIELD NAME
      const giftCardLink = `giftcard-${item.instanceId}.pdf`;

      return `
        <div class="bg-gray-50 border rounded-2xl p-4 flex justify-between items-center">

          <div>
            <p class="font-semibold text-sm">
              ₦${product.value.toLocaleString()} Gift Card
            </p>
            <p class="text-xs text-gray-500">
              Code: ${item.instanceId}
            </p>
          </div>

          <div class="text-right">
            <p class="font-bold text-red-500 text-sm mb-2">
              ₦${product.orderPrice.toLocaleString()}
            </p>


              <button onclick="handleDownload('${order.id}', '${item.instanceId}', ${item.id})"
  class="px-3 py-1 text-xs bg-red-500 text-white rounded-lg">
  Preview
</button>
          
</div>
        </div>
      `;
    }).join('')
  : `<p class="text-sm text-gray-500">No items found</p>`;

  document.getElementById('orderDetailsContainer').innerHTML = `
    <div class="p-6 border-b flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-bold">Order Details</h2>
        <p class="text-gray-500">Complete purchase information</p>
      </div>
      <span class="px-4 py-2 rounded-full text-sm font-semibold ${getStatusColor(order.status)}">${order.status}</span>
    </div>

    <div class="p-6 space-y-5">

      <div class="bg-green-50 border border-green-200 rounded-2xl p-5">
        <h3 class="text-green-700 font-bold text-lg mb-2">Purchase Successful</h3>
        <p class="text-green-600 text-sm">Your virtual gift cards are ready below.</p>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <div class="bg-gray-50 rounded-2xl p-5">
          <p class="text-sm text-gray-500 mb-1">Order ID</p>
          <p class="font-bold text-lg">${order.id}</p>
        </div>

        <div class="bg-gray-50 rounded-2xl p-5">
          <p class="text-sm text-gray-500 mb-1">Order Date</p>
          <p class="font-semibold">${order.date}</p>
        </div>
      </div>

      <div class="bg-gradient-to-r from-red-500 to-rose-500 rounded-3xl p-6 text-white">
        <p class="text-red-100 mb-2">Total Amount</p>
        <h3 class="text-4xl font-bold">₦${order.amount.toLocaleString()}</h3>
      </div>

      <!-- 🔥 NEW SECTION -->
      <div>
        <h3 class="text-lg font-bold mb-3">Purchased Gift Cards</h3>
        <div class="space-y-3">
          ${itemsHTML}
        </div>
      </div>

    </div>
  `;

  document.querySelectorAll('#ordersList button').forEach(btn => {
    btn.classList.remove('bg-red-50', 'border-red-200');
    btn.classList.add('bg-white');
  });

    event.currentTarget.classList.add('bg-red-50', 'border-red-200');
    lucide.createIcons();
  }

  renderOrders();

  if (savedOrders.length > 0) {
    showOrder(savedOrders[0].id);
  }

  lucide.createIcons();
  function handleDownload(orderId, instanceId, productId) {
  const order = savedOrders.find(o => o.id === orderId);
  if (!order) return;

  const item = order.items.find(i => i.instanceId === instanceId);

  const product = [
    { id: 1, value: 2000, orderPrice: 50 },
    { id: 2, value: 5000, orderPrice: 125 },
    { id: 3, value: 10000, orderPrice: 250 },
    { id: 4, value: 15000, orderPrice: 375 },
    { id: 5, value: 20000, orderPrice: 500 },
    { id: 6, value: 50000, orderPrice: 1200 }
  ].find(p => p.id == productId);

  const modal = document.getElementById("pdfPreviewBox");
  const frame = document.getElementById("pdfFrame");
  const loader = document.getElementById("pdfLoader");
  const actions = document.getElementById("pdfActions");

  // OPEN MODAL
  modal.classList.remove("hidden");

  // RESET STATE
  loader.style.display = "block";
  frame.classList.add("hidden");
  actions.classList.add("hidden");
  frame.src = "";

  // 🔥 CLEAN OLD PDF (VERY IMPORTANT)
  if (currentPdfUrl) {
    URL.revokeObjectURL(currentPdfUrl);
    currentPdfUrl = null;
  }

  // GENERATE NEW PDF
  currentPdfUrl = generateGiftCardPDF(item, product, order);

  // LOAD INTO FRAME
  frame.src = currentPdfUrl;

  // WAIT FOR LOAD
  frame.onload = () => {
    loader.style.display = "none";
    frame.classList.remove("hidden");
    actions.classList.remove("hidden");
  };

  
}

</script>
<script>
document.getElementById("pdfPreviewBox").onclick = (e) => {
  if (e.target.id === "pdfPreviewBox") {

    const frame = document.getElementById("pdfFrame");

    // 🔥 FULL RESET WHEN CLOSING
    frame.src = "about:blank";
    frame.classList.add("hidden");

    if (currentPdfUrl) {
      URL.revokeObjectURL(currentPdfUrl);
      currentPdfUrl = null;
    }

    e.currentTarget.classList.add("hidden");
  }
};
async function sharePdfFile() {
  if (!currentPdfUrl) return;

  try {
    const response = await fetch(currentPdfUrl);
    const blob = await response.blob();

    const file = new File([blob], "MOMA-GiftCard.pdf", {
      type: "application/pdf"
    });

    if (navigator.share && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: "MOMA Gift Card",
        text: "Here is your gift card",
        files: [file]
      });
    } else {
      alert("Sharing not supported on this device. Please download instead.");
    }

  } catch (err) {
    console.error("Share failed:", err);
  }
}
</script>
</body>
</html>
