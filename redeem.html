 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redeem</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Modern Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #f7f7f8;
    zoom: 0.9;
  }

  .heading-font {
    font-family: 'Space Grotesk', sans-serif;
  }
 
  /* Hide scrollbar for Chrome, Safari, Edge */
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }

  /* Hide scrollbar for Firefox */
  .no-scrollbar {
    scrollbar-width: none;
  }

  /* Hide scrollbar for IE & old Edge */
  .no-scrollbar {
    -ms-overflow-style: none;
  }

</style>
</head>

<body>

<!-- MAIN WRAPPER (DESKTOP FEEL) -->
<div class="max-w-6xl mx-auto min-h-0">

<!-- NAVIGATION -->
<div class="
  fixed bottom-1 left-1/2 -translate-x-1/2 w-full max-w-md px-4

  md:top-1/2 md:left-4 md:-translate-y-1/2 md:translate-x-0 md:w-auto md:max-w-none md:px-0
">

  <div class="
    bg-white border border-gray-200 shadow-md rounded-2xl px-4 py-3 
    flex justify-between items-center 

    md:flex-col md:items-center md:gap-5 md:px-2 md:py-3
  ">

    <!-- Dashboard -->
    <div id="nav-dashboard" class="flex flex-col items-center text-gray-400 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="home" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1 font-medium">Dashboard</span>
    </div>

    <!-- Redeem -->
    <div id="nav-redeem" class="flex flex-col items-center text-red-600 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="ticket" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1 font-medium">Redeem</span>
    </div>

    <!-- Sales -->
    <div id="nav-sales" class="flex flex-col items-center text-gray-400 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1">Sales</span>
    </div>

    <!-- Profile -->
    <div id="nav-profile" class="flex flex-col items-center text-gray-400 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1">Profile</span>
    </div>

  </div>

</div>
<!-- REDEEM PAGE -->
<div id="redeemPage" class=" max-w-6xl mx-auto px-6 pb-14">

    <!-- HEADER -->
    <div class="bg-white rounded-2xl p-5 border border-gray-100 flex items-center gap-3 mb-6 ">
  
      <div class="w-10 h-10 bg-red-50 text-red-600 flex items-center justify-center rounded-xl">
        <i data-lucide="ticket"></i>
      </div>
              
      <h2 class="text-lg font-semibold text-gray-900">Redeem</h2>
  
    </div>
  
    <!-- TABS -->
    <div class="flex justify-between items-center border-b border-gray-200 mb-4">
  
      <button id="tab-sold" class="pb-2 text-sm font-medium text-red-600 border-b-2 border-red-600">
        Cards Unredeemed
      </button>
  
      <button id="tab-redeemed" class="pb-2 text-sm text-gray-400">
        Cards Redeemed
      </button>
  
    </div>
  
    <!-- LIST CONTAINER -->
    <div id="redeemList" class="space-y-3">
  
      <!-- CONTENT WILL BE INJECTED HERE -->
  
    </div>
 
  
  </div>

<!-- REDEEM MODAL -->
<div id="redeemModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
  <div class="bg-white w-[90%] max-w-sm rounded-2xl p-5 shadow-xl relative">

    <!-- INPUT FORM -->
    <div id="redeemForm">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 bg-red-50 text-red-600 flex items-center justify-center rounded-lg">
          <i data-lucide="ticket"></i>
        </div>
        <h3 class="font-semibold text-gray-900">Redeem Gift Card</h3>
      </div>

      <div class="space-y-3">
        <input id="giftCodeInput" type="text" placeholder="Gift Code"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500">
        <input id="amountInput" type="number" placeholder="Enter Amount"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500">
      </div>

      <div class="flex justify-end gap-2 mt-5">
        <button id="closeModal" class="px-4 py-2 text-sm text-gray-500">Cancel</button>
        <button id="confirmRedeem" class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg">
          Redeem
        </button>
      </div>

      <p id="errorText" class="text-xs text-red-500 mt-2 hidden"></p>
    </div>

    <!-- PRELOADER -->
    <div id="redeemLoader" class="hidden flex flex-col items-center justify-center text-red-600">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-3 animate-spin"></div>
      <p class="text-sm font-medium">Processing...</p>
    </div>

    <!-- SUCCESS MESSAGE -->
    <div id="redeemSuccess" class="hidden flex flex-col items-center justify-center text-green-600">
      <div class="w-16 h-16 flex items-center justify-center rounded-full bg-green-100 mb-3">
        <i data-lucide="check-circle" class="w-10 h-10"></i>
      </div>
      <p class="text-sm font-semibold">Gift Redeemed Successfully!</p>
    </div>

  </div>
</div>

<!-- Loader CSS -->
<style>
.loader {
  border-top-color: #f87171; /* Tailwind red-500 */
}
</style>
  <script>

    lucide.createIcons();
  </script>
<script>
  // ==============================
// DEMO DATA (ONLY IF EMPTY)
// ==============================

  // ==============================
// NAVIGATION
// ==============================
const navRedeem = document.getElementById("nav-redeem");
const navDashboard = document.getElementById("nav-dashboard");
const navSales = document.getElementById("nav-sales");
const navProfile = document.getElementById("nav-profile");

navRedeem?.addEventListener("click", () => {
  window.location.href = "redeem.html";
});

navDashboard?.addEventListener("click", () => {
  window.location.href = "dashboard.html";
});

navSales?.addEventListener("click", () => {
  window.location.href = "sales.html";
});

navProfile?.addEventListener("click", () => {
  window.location.href = "profile.html";
});

// ==============================
// ACTIVE NAV
// ==============================
const currentPage = window.location.pathname;

if (currentPage.includes("redeem.html")) {
  navRedeem?.classList.add("text-red-600");
}

// ==============================
// ELEMENTS
// ==============================
const tabSold = document.getElementById("tab-sold");
const tabRedeemed = document.getElementById("tab-redeemed");
const list = document.getElementById("redeemList");

// ==============================
// LOAD SOLD CARDS (FROM DASHBOARD)
// ==============================
function loadSold() {
  list.innerHTML = "";

  const cards = JSON.parse(localStorage.getItem("soldCards")) || [];

  // ONLY ACTIVE (UNREDEEMED)
  const activeCards = cards.filter(c => c.status === "active");

  if (activeCards.length === 0) {
    list.innerHTML = `<p class="text-gray-400 text-sm">No active cards</p>`;
    return;
  }

  activeCards.forEach(card => {
    list.innerHTML += `
      <div class="bg-gray-50 rounded-xl px-4 py-4 flex justify-between items-center">
        <div>
          <p class="text-xs text-gray-500">Gift Code</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">${card.giftCode}</p>
        </div>

        <div class="text-right">
          <p class="text-xs text-gray-500">Amount</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">₦${card.amount}</p>
        </div>

        <button data-code="${card.giftCode}" class="ml-4 px-4 py-2 text-xs rounded-lg bg-red-600 text-white">
          Redeem
        </button>
      </div>
    `;
  });
}

// ==============================
// LOAD REDEEMED
// ==============================
function loadRedeemed() {
  list.innerHTML = "";

  const redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];

  if (redeemed.length === 0) {
    list.innerHTML = `<p class="text-gray-400 text-sm">No redeemed cards</p>`;
    return;
  }

  redeemed.forEach(card => {
    list.innerHTML += `
      <div class="bg-gray-50 rounded-xl px-4 py-4 flex justify-between items-center">
        <div>
          <p class="text-xs text-gray-500">Gift Code</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">${card.code}</p>
        </div>

        <div class="text-right">
          <p class="text-xs text-gray-500">Balance</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">₦${card.balance}</p>
        </div>

        <button class="ml-4 px-4 py-2 text-xs rounded-lg bg-gray-900 text-white">
          Deduct
        </button>
      </div>
    `;
  });
}
// ==============================
// SECURITY SYSTEM
// ==============================
let attemptsLeft = parseInt(localStorage.getItem("attemptsLeft")) || 3;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

function isLocked() {
  return Date.now() < lockUntil;
}

function updateLock() {
  localStorage.setItem("attemptsLeft", attemptsLeft);
  localStorage.setItem("lockUntil", lockUntil);
}
// ==============================
// HANDLE REDEEM CLICK
// ==============================
// ==============================
// MODAL LOGIC
// ==============================
const modal = document.getElementById("redeemModal");
const closeModal = document.getElementById("closeModal");
const confirmRedeem = document.getElementById("confirmRedeem");
const giftInput = document.getElementById("giftCodeInput");
const amountInput = document.getElementById("amountInput");

let selectedCardCode = null;

list.addEventListener("click", (e) => {
  const btn = e.target.closest("button");

  if (btn && btn.dataset.code) {
    selectedCardCode = btn.dataset.code;

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    giftInput.value = "";
    amountInput.value = "";
  }
});

// CLOSE MODAL
closeModal.addEventListener("click", () => {
  modal.classList.add("hidden");
});

// CONFIRM REDEEM
confirmRedeem.addEventListener("click", () => {
  errorText.classList.add("hidden");

  const enteredCode = giftInput.value.trim();
  const amountUsed = parseInt(amountInput.value);

  if (!enteredCode || !amountUsed) {
    errorText.textContent = "All fields are required";
    errorText.classList.remove("hidden");
    return;
  }

  const cards = JSON.parse(localStorage.getItem("soldCards")) || [];
  const redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];

  const cardIndex = cards.findIndex(c => c.giftCode === enteredCode && c.status === "active");

  if (cardIndex === -1 || amountUsed > cards[cardIndex].amount) {
    errorText.textContent = "Invalid code or amount too high";
    errorText.classList.remove("hidden");
    return;
  }

  // ✅ Show loader
  document.getElementById("redeemForm").classList.add("hidden");
  const loader = document.getElementById("redeemLoader");
  const success = document.getElementById("redeemSuccess");
  loader.classList.remove("hidden");

  // Simulate processing delay
  setTimeout(() => {
    loader.classList.add("hidden");
    success.classList.remove("hidden");

    // Update localStorage
    const card = cards[cardIndex];
    card.status = "redeemed";
    card.balance = card.amount - amountUsed;
    redeemed.push({ code: card.giftCode, balance: card.balance });

    localStorage.setItem("soldCards", JSON.stringify(cards));
    localStorage.setItem("redeemedCards", JSON.stringify(redeemed));

    // Refresh sold/redeemed lists
    loadSold();
    loadRedeemed();

    // Auto-close modal after 2s
    setTimeout(() => {
      modal.classList.add("hidden");
      document.getElementById("redeemForm").classList.remove("hidden");
      success.classList.add("hidden");
    }, 2000);

  }, 1200); // 1.2s preloader
});
// ==============================
// TAB SWITCHING
// ==============================
tabSold.addEventListener("click", () => {
  tabSold.classList.add("text-red-600", "border-b-2", "border-red-600");
  tabRedeemed.classList.remove("text-red-600", "border-b-2", "border-red-600");

  loadSold();
});

tabRedeemed.addEventListener("click", () => {
  tabRedeemed.classList.add("text-red-600", "border-b-2", "border-red-600");
  tabSold.classList.remove("text-red-600", "border-b-2", "border-red-600");

  loadRedeemed();
});

// ==============================
// INIT
// ==============================
window.addEventListener("DOMContentLoaded", () => {
  loadSold(); // default tab
});
</script>
</body>
</html>
