<div id="offlineBanner" class="fixed top-0 left-0 right-0 z-50 hidden">
  <div class="bg-amber-50 border-b border-amber-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-center gap-3">
      
      <!-- Offline Wi-Fi Icon -->
      <svg xmlns="http://www.w3.org/2000/svg"
           class="w-5 h-5 text-amber-600 flex-shrink-0"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round">
        
        <!-- Wi-Fi waves -->
        <path d="M2.5 8.5a16 16 0 0119 0" />
        <path d="M5.5 11.5a11.5 11.5 0 0113 0" />
        <path d="M8.8 14.8a6.5 6.5 0 016.4 0" />
        <circle cx="12" cy="18" r="1" fill="currentColor" stroke="none" />
        
        <!-- Cross mark -->
        <path d="M18.5 5.5l4 4" />
        <path d="M22.5 5.5l-4 4" />
      </svg>

      <p class="text-sm font-medium text-amber-800">
        You're offline. Please check your network.
      </p>
    </div>
  </div>
</div>

<script>
  const offlineBanner = document.getElementById('offlineBanner');

  function setReadOnlyMode(isOffline) {
    document.querySelectorAll('input, textarea, select, button').forEach(el => {
      if (isOffline) {
        el.dataset.wasDisabled = el.disabled;
        el.disabled = true;
      } else {
        if (el.dataset.wasDisabled !== 'true') {
          el.disabled = false;
        }
      }
    });

    document.querySelectorAll('[contenteditable="true"]').forEach(el => {
      if (isOffline) {
        el.dataset.wasContentEditable = 'true';
        el.contentEditable = 'false';
      } else if (el.dataset.wasContentEditable === 'true') {
        el.contentEditable = 'true';
      }
    });

    document.body.classList.toggle('offline-mode', isOffline);
  }

  function updateConnectionStatus() {
    const isOffline = !navigator.onLine;

    offlineBanner.classList.toggle('hidden', !isOffline);
    setReadOnlyMode(isOffline);
  }

  window.addEventListener('online', updateConnectionStatus);
  window.addEventListener('offline', updateConnectionStatus);

  updateConnectionStatus();
</script>

<script>
  // ==============================
// DEMO DATA (ONLY IF EMPTY)
// ==============================

  // ==============================
// NAVIGATION
// ==============================
const navRedeem = document.getElementById("nav-redeem");
const navDashboard = document.getElementById("nav-dashboard");
const navSales = document.getElementById("nav-sales");
const navProfile = document.getElementById("nav-profile");

navRedeem?.addEventListener("click", () => {
  window.location.href = "redeem.html";
});

navDashboard?.addEventListener("click", () => {
  window.location.href = "dashboard.html";
});

navSales?.addEventListener("click", () => {
  window.location.href = "sales.html";
});

navProfile?.addEventListener("click", () => {
  window.location.href = "profile.html";
});

// ==============================
// ACTIVE NAV
// ==============================
const currentPage = window.location.pathname;

if (currentPage.includes("redeem.html")) {
  navRedeem?.classList.add("text-red-600");
}

// ==============================
// ELEMENTS
// ==============================
const tabSold = document.getElementById("tab-sold");
const tabRedeemed = document.getElementById("tab-redeemed");
const list = document.getElementById("redeemList");

// ==============================
// LOAD SOLD CARDS (FROM DASHBOARD)
// ==============================
function loadSold() {
  list.innerHTML = "";

  const cards = JSON.parse(localStorage.getItem("soldCards")) || [];

  // ONLY ACTIVE (UNREDEEMED)
  const activeCards = cards.filter(c => c.status === "active");

  if (activeCards.length === 0) {
    list.innerHTML = `<p class="text-gray-400 text-sm">No active cards</p>`;
    return;
  }

  activeCards.forEach(card => {
    list.innerHTML += `
      <div class="bg-gray-50 rounded-xl px-4 py-4 flex justify-between items-center">
        <div>
          <p class="text-xs text-gray-500">Gift Code</p>
          <div class="flex items-center gap-2 mt-1">
  <p class="text-sm font-semibold text-gray-900">${card.giftCode}</p>

  <button onclick="copyCode('${card.giftCode}')" 
    class="text-gray-400 hover:text-gray-700">
    <i data-lucide="copy" class="w-4 h-4"></i>
  </button>
</div>
        </div>

        <div class="text-right">
          <p class="text-xs text-gray-500">Amount</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">₦${card.amount}</p>
        </div>

        <button data-code="${card.giftCode}" class="ml-4 px-4 py-2 text-xs rounded-lg bg-red-600 text-white">
          Redeem
        </button>
      </div>
    `;
  });
  lucide.createIcons();
}

// ==============================
// LOAD REDEEMED
// ==============================
function loadRedeemed() {
  list.innerHTML = "";

  const redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];

  if (redeemed.length === 0) {
    list.innerHTML = `<p class="text-gray-400 text-sm">No redeemed cards</p>`;
    return;
  }

  redeemed.forEach(card => {
    list.innerHTML += `
      <div class="bg-gray-50 rounded-xl px-4 py-4 flex justify-between items-center">
        <div>
          <p class="text-xs text-gray-500">Gift Code</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">${card.code}</p>
        </div>

        <div class="text-right">
          <p class="text-xs text-gray-500">Balance</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">₦${card.balance}</p>
        </div>

        <button class="ml-4 px-4 py-2 text-xs rounded-lg bg-gray-900 text-white">
          Deduct
        </button>
      </div>
    `;
  });
}
// ==============================
// SECURITY SYSTEM
// ==============================
let attemptsLeft = parseInt(localStorage.getItem("attemptsLeft")) || 3;
let lockUntil = parseInt(localStorage.getItem("lockUntil")) || 0;

function isLocked() {
  return Date.now() < lockUntil;
}

function updateLock() {
  localStorage.setItem("attemptsLeft", attemptsLeft);
  localStorage.setItem("lockUntil", lockUntil);
}
// ==============================
// HANDLE REDEEM CLICK
// ==============================
// ==============================
// MODAL LOGIC
// ==============================
const modal = document.getElementById("redeemModal");
const closeModal = document.getElementById("closeModal");
const confirmRedeem = document.getElementById("confirmRedeem");
const giftInput = document.getElementById("giftCodeInput");
const amountInput = document.getElementById("amountInput");

let selectedCardCode = null;

list.addEventListener("click", (e) => {
  const btn = e.target.closest("button");

  if (btn && btn.dataset.code) {
    selectedCardCode = btn.dataset.code;

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    giftInput.value = "";
    amountInput.value = "";
  }
});

// CLOSE MODAL
closeModal.addEventListener("click", () => {
  modal.classList.add("hidden");
});

// CONFIRM REDEEM
confirmRedeem.addEventListener("click", () => {
  errorText.classList.add("hidden");

  const enteredCode = giftInput.value.trim();
  const amountUsed = parseInt(amountInput.value);

  if (!enteredCode || !amountUsed) {
    errorText.textContent = "All fields are required";
    errorText.classList.remove("hidden");
    return;
  }

  const cards = JSON.parse(localStorage.getItem("soldCards")) || [];
  const redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];

  const cardIndex = cards.findIndex(c => 
  c.giftCode === selectedCardCode && 
  c.status === "active"
);

// ❌ If user typed wrong code
if (enteredCode !== selectedCardCode) {
  errorText.textContent = "Gift code does not match selected card";
  errorText.classList.remove("hidden");
  return;
}

if (cardIndex === -1) {
  errorText.textContent = "Card not found or already redeemed";
  errorText.classList.remove("hidden");
  return;
}

if (amountUsed > cards[cardIndex].amount) {
  errorText.textContent = "Amount exceeds card value";
  errorText.classList.remove("hidden");
  return;
}

  // ✅ Show loader
  document.getElementById("redeemForm").classList.add("hidden");
  const loader = document.getElementById("redeemLoader");
  const success = document.getElementById("redeemSuccess");
  loader.classList.remove("hidden");

  // Simulate processing delay
  setTimeout(() => {
    loader.classList.add("hidden");
    success.classList.remove("hidden");

    // Update localStorage
    const card = cards[cardIndex];
    card.status = "redeemed";
    card.balance = card.amount - amountUsed;
    redeemed.push({ code: card.giftCode, balance: card.balance });

    localStorage.setItem("soldCards", JSON.stringify(cards));
    localStorage.setItem("redeemedCards", JSON.stringify(redeemed));

    // Refresh sold/redeemed lists
    loadSold();
    loadRedeemed();

    // Auto-close modal after 2s
    setTimeout(() => {
  modal.classList.add("hidden");
  document.getElementById("redeemForm").classList.remove("hidden");
  success.classList.add("hidden");

  // ✅ SWITCH TO REDEEMED TAB UI
  tabRedeemed.classList.add("text-red-600", "border-b-2", "border-red-600");
  tabSold.classList.remove("text-red-600", "border-b-2", "border-red-600");

  // ✅ LOAD REDEEMED VIEW ONLY
  loadRedeemed();

}, 2000);

  }, 1200); // 1.2s preloader
});
// ==============================
// TAB SWITCHING
// ==============================
tabSold.addEventListener("click", () => {
  tabSold.classList.add("text-red-600", "border-b-2", "border-red-600");
  tabRedeemed.classList.remove("text-red-600", "border-b-2", "border-red-600");

  loadSold();
});

tabRedeemed.addEventListener("click", () => {
  tabRedeemed.classList.add("text-red-600", "border-b-2", "border-red-600");
  tabSold.classList.remove("text-red-600", "border-b-2", "border-red-600");

  loadRedeemed();
});

// ==============================
// INIT
// ==============================
window.addEventListener("DOMContentLoaded", () => {
  loadSold(); // default tab
});

const openSearch = document.getElementById("openSearch");
const searchBar = document.getElementById("searchBar");
const searchInput = document.getElementById("searchInput");

let currentTab = "sold"; // track active tab
let selectedRedeemedCode = null;
// TOGGLE SEARCH BAR
openSearch.addEventListener("click", () => {
  searchBar.classList.toggle("hidden");
  searchInput.focus();
});

// TRACK ACTIVE TAB
tabSold.addEventListener("click", () => {
  currentTab = "sold";
});

tabRedeemed.addEventListener("click", () => {
  currentTab = "redeemed";
});

// LIVE SEARCH
searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();

  if (currentTab === "sold") {
    searchSold(value);
  } else {
    searchRedeemed(value);
  }
});
function searchSold(query) {
  const cards = JSON.parse(localStorage.getItem("soldCards")) || [];

  const filtered = cards.filter(c => 
    c.status === "active" &&
    c.giftCode.toLowerCase().includes(query)
  );

  renderFilteredSold(filtered);
  
}

function renderFilteredSold(cards) {
  list.innerHTML = "";

  if (cards.length === 0) {
    list.innerHTML = `<p class="text-gray-400 text-sm">No matching cards</p>`;
    return;
  }

  cards.forEach(card => {
    list.innerHTML += `
      <div class="bg-gray-50 rounded-xl px-4 py-4 flex justify-between items-center">
        
        <div>
          <p class="text-xs text-gray-500">Gift Code</p>

          <div class="flex items-center gap-2 mt-1">
            <p class="text-sm font-semibold text-gray-900">${card.giftCode}</p>

            <button onclick="copyCode('${card.giftCode}')"
              class="text-gray-400 hover:text-gray-700">
              <i data-lucide="copy" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <div class="text-right">
          <p class="text-xs text-gray-500">Amount</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">₦${card.amount}</p>
        </div>

        <button data-code="${card.giftCode}" class="ml-4 px-4 py-2 text-xs rounded-lg bg-red-600 text-white">
          Redeem
        </button>
      </div>
    `;
  });

  lucide.createIcons();
}
function searchRedeemed(query) {
  const redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];

  const filtered = redeemed.filter(c => 
    c.code.toLowerCase().includes(query)
  );

  renderFilteredRedeemed(filtered);
}

function renderFilteredRedeemed(cards) {
  list.innerHTML = "";

  if (cards.length === 0) {
    list.innerHTML = `<p class="text-gray-400 text-sm">No matching cards</p>`;
    return;
  }

  cards.forEach(card => {
    list.innerHTML += `
      <div class="bg-gray-50 rounded-xl px-4 py-4 flex justify-between items-center">
        <p class="text-sm font-semibold text-gray-900 mt-1">${card.code}</p>

        <div class="text-right">
          <p class="text-xs text-gray-500">Balance</p>
          <p class="text-sm font-semibold text-gray-900 mt-1">₦${card.balance}</p>
        </div>

        <button class="ml-4 px-4 py-2 text-xs rounded-lg bg-gray-900 text-white">
          Deduct
        </button>
      </div>
    `;
  });

  lucide.createIcons();
}
list.addEventListener("click", (e) => {
  const btn = e.target.closest("button");

  // REDEEM BUTTON
  if (btn && btn.dataset.code) {
    selectedCardCode = btn.dataset.code;

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    giftInput.value = selectedCardCode;
    giftInput.readOnly = true;
  }

  // ✅ DEDUCT BUTTON
  if (btn && !btn.dataset.code && btn.textContent.includes("Deduct")) {
  const cardCode = btn.closest("div").querySelector("p.text-sm").textContent;

  selectedRedeemedCode = cardCode;

  let redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];
  const card = redeemed.find(c => c.code === cardCode);

  // ✅ Show balance in modal
  document.getElementById("deductBalance").textContent = "₦" + card.balance;

  deductModal.classList.remove("hidden");
  deductModal.classList.add("flex");

  deductAmountInput.value = "";
  deductError.classList.add("hidden");
}
});
const deductModal = document.getElementById("deductModal");
const confirmDeduct = document.getElementById("confirmDeduct");
const closeDeduct = document.getElementById("closeDeduct");
const deductAmountInput = document.getElementById("deductAmount");
const deductError = document.getElementById("deductError");

// CLOSE
closeDeduct.addEventListener("click", () => {
  deductModal.classList.add("hidden");
});

// CONFIRM
confirmDeduct.addEventListener("click", () => {
  deductError.classList.add("hidden");

  const amount = parseInt(deductAmountInput.value);

  if (!amount || amount <= 0) {
    deductError.textContent = "Enter a valid amount";
    deductError.classList.remove("hidden");
    return;
  }

  let redeemed = JSON.parse(localStorage.getItem("redeemedCards")) || [];
  const index = redeemed.findIndex(c => c.code === selectedRedeemedCode);

  if (index === -1) return;

  const currentBalance = redeemed[index].balance;

  if (amount > currentBalance) {
    deductError.textContent = `Cannot deduct more than ₦${currentBalance}`;
    deductError.classList.remove("hidden");
    return;
  }

  // ✅ SHOW LOADER STYLE (reuse idea)
  confirmDeduct.textContent = "Processing...";
  confirmDeduct.disabled = true;

  setTimeout(() => {
    // ✅ Deduct
    redeemed[index].balance -= amount;

    if (redeemed[index].balance === 0) {
      redeemed.splice(index, 1);
    }

    localStorage.setItem("redeemedCards", JSON.stringify(redeemed));

    // ✅ SHOW SUCCESS UI
    document.getElementById("deductSuccess").classList.remove("hidden");

    // Hide input area
    deductAmountInput.classList.add("hidden");

    // Refresh list
    loadRedeemed();

    setTimeout(() => {
      deductModal.classList.add("hidden");

      // Reset UI
      document.getElementById("deductSuccess").classList.add("hidden");
      deductAmountInput.classList.remove("hidden");
      confirmDeduct.textContent = "Deduct";
      confirmDeduct.disabled = false;
      deductAmountInput.value = "";

    }, 1800);

  }, 800);
});
function copyCode(code) {
  navigator.clipboard.writeText(code);

  // Optional feedback
  alert("Code copied!");
}

</script>
