<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #f7f7f8;
    zoom: 0.85;
  }

  .heading-font {
    font-family: 'Space Grotesk', sans-serif;
  }
 
  /* Hide scrollbar for Chrome, Safari, Edge */
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }

  /* Hide scrollbar for Firefox */
  .no-scrollbar {
    scrollbar-width: none;
  }

  /* Hide scrollbar for IE & old Edge */
  .no-scrollbar {
    -ms-overflow-style: none;
  }
/* DEFAULT: mobile (bottom nav) */
.custom-nav {

  top: auto;

html {

.max-w-6xl {

<body>
<!-- =========================================
     OFFLINE BANNER + READ-ONLY MODE
========================================= -->
<div id="offlineBanner" class="fixed top-0 left-0 right-0 z-50 hidden">
  <div class="bg-amber-50 border-b border-amber-200 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-center gap-3">
      
      <!-- Offline Wi-Fi Icon -->
      <svg xmlns="http://www.w3.org/2000/svg"
           class="w-5 h-5 text-amber-600 flex-shrink-0"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round">
        
        <!-- Wi-Fi waves -->
        <path d="M2.5 8.5a16 16 0 0119 0" />
        <path d="M5.5 11.5a11.5 11.5 0 0113 0" />
        <path d="M8.8 14.8a6.5 6.5 0 016.4 0" />
        <circle cx="12" cy="18" r="1" fill="currentColor" stroke="none" />
        
        <!-- Cross mark -->
        <path d="M18.5 5.5l4 4" />
        <path d="M22.5 5.5l-4 4" />
      </svg>

      <p class="text-sm font-medium text-amber-800">
        You're offline. Please check your network.
      </p>
    </div>
  </div>
</div>

<script>
  const offlineBanner = document.getElementById('offlineBanner');

  function setReadOnlyMode(isOffline) {
    document.querySelectorAll('input, textarea, select, button').forEach(el => {
      if (isOffline) {
        el.dataset.wasDisabled = el.disabled;
        el.disabled = true;
      } else {
        if (el.dataset.wasDisabled !== 'true') {
          el.disabled = false;
        }
      }
    });

    document.querySelectorAll('[contenteditable="true"]').forEach(el => {
      if (isOffline) {
        el.dataset.wasContentEditable = 'true';
        el.contentEditable = 'false';
      } else if (el.dataset.wasContentEditable === 'true') {
        el.contentEditable = 'true';
      }
    });

    document.body.classList.toggle('offline-mode', isOffline);
  }

  function updateConnectionStatus() {
    const isOffline = !navigator.onLine;

    offlineBanner.classList.toggle('hidden', !isOffline);
    setReadOnlyMode(isOffline);
  }

  window.addEventListener('online', updateConnectionStatus);
  window.addEventListener('offline', updateConnectionStatus);

  updateConnectionStatus();
</script>

<style>
  body.offline-mode button:not(:disabled) {
    pointer-events: none;
  }

  body.offline-mode input,
  body.offline-mode textarea,
  body.offline-mode select {
    background-color: #f9fafb;
    cursor: not-allowed;
  }
</style>
<!-- MAIN WRAPPER (DESKTOP FEEL) -->
<div class="max-w-6xl mx-auto min-h-0">

<!-- NAVIGATION -->
<div class="fixed bottom-4 left-0 right-0 z-50 flex justify-center
            min-[1100px]:left-3 min-[1100px]:right-auto
            min-[1100px]:top-1/2 min-[1100px]:-translate-y-1/2
            min-[1100px]:bottom-auto">

  <!-- NAV CONTAINER -->
  <div class="bg-white border border-gray-200 shadow-xl rounded-3xl px-5 py-3
              flex items-center gap-6
              min-[1100px]:flex-col min-[1200px]:gap-5
              min-[1100px]:px-2 min-[1200px]:py-4
              min-[1100px]:w-[72px]">

    <!-- DASHBOARD -->
    <div onclick="window.location.href='dashboard.html'" class="flex flex-col items-center text-grey-600 cursor-pointer transition">
      <i data-lucide="home" class="w-6 h-6 stroke-[2.5]"></i>
      <span class="text-[11px] mt-1 font-semibold min-[1100px]:hidden">Dashboard</span>
    </div>

    <!-- SALES -->
    <div  class="flex flex-col items-center text-red-600 hover:text-black cursor-pointer transition">
      <i data-lucide="bar-chart-3" class="w-6 h-6 stroke-[2.5]"></i>
      <span class="text-[11px] mt-1 font-medium min-[1100px]:hidden">Sales</span>
    </div>

    <!-- PLUS BUTTON -->
    <div onclick="window.location.href='payment.html'" class="flex flex-col items-center justify-center -mt-8 cursor-pointer
                min-[1100px]:mt-0">

      <div class="w-14 h-14 rounded-full bg-gradient-to-br from-red-500 to-pink-500 
                  shadow-lg flex items-center justify-center text-white">

        <i data-lucide="plus" class="w-7 h-7 stroke-[3]"></i>
      </div>

      <span class="text-[11px] mt-1 font-semibold text-gray-700 min-[1100px]:hidden">Add</span>
    </div>

    <!-- REDEEM -->
    <div onclick="window.location.href='redeem.html'" class="flex flex-col items-center text-gray-600 hover:text-black cursor-pointer transition">
      <i data-lucide="ticket" class="w-6 h-6 stroke-[2.5]"></i>
      <span class="text-[11px] mt-1 font-medium min-[1100px]:hidden">Redeem</span>
    </div>

    <!-- PROFILE -->
    <div onclick="window.location.href='profile.html'" class="flex flex-col items-center text-gray-600 hover:text-black cursor-pointer transition">
      <i data-lucide="user" class="w-6 h-6 stroke-[2.5]"></i>
      <span class="text-[11px] mt-1 font-medium min-[1100px]:hidden">Profile</span>
    </div>

  </div>
</div>
  <!-- SALES PAGE -->
  <div id="salesPage" class=" max-w-6xl mx-auto px-6 pb-24">

    <!-- HEADER -->
    <div class="bg-white rounded-2xl p-5 border border-gray-100 flex items-center gap-3 mb-6">
  
      <div class="w-10 h-10 bg-red-50 text-red-600 flex items-center justify-center rounded-xl">
        <i data-lucide="bar-chart-3"></i>
      </div>
  
      <h2 class="text-lg font-semibold text-gray-900">Sales</h2>
  
    </div>
  
    <!-- FILTERS -->
    <div class="flex gap-3 mb-5 overflow-x-auto pb-1">
  
      <button class="filter-btn active-filter px-4 py-2 text-xs rounded-lg bg-red-600 text-white">Today</button>
  
      <button class="filter-btn px-4 py-2 text-xs rounded-lg bg-gray-100 text-gray-600">This Week</button>
  
      <button class="filter-btn px-4 py-2 text-xs rounded-lg bg-gray-100 text-gray-600">This Month</button>
  
      <button class="filter-btn px-4 py-2 text-xs rounded-lg bg-gray-100 text-gray-600">All Sales</button>
  
    </div>
  
    <!-- SALES LIST -->
    <div id="salesList" class="space-y-3">
  
      <!-- JS WILL FILL -->
  
    </div>
  
  </div>
    </div>
  
  </div>
  
  </div>

  <script>
    lucide.createIcons();
  </script>
<script>
    const navRedeem = document.getElementById("nav-redeem");
const navDashboard = document.getElementById("nav-dashboard");
const navSales = document.getElementById("nav-sales");
const navProfile = document.getElementById("nav-profile");

navRedeem?.addEventListener("click", () => {
  window.location.href = "redeem.html";
});

navDashboard?.addEventListener("click", () => {
  window.location.href = "dashboard.html";
});

navSales?.addEventListener("click", () => {
  window.location.href = "sales.html";
});

navProfile?.addEventListener("click", () => {
  window.location.href = "profile.html";
});
const salesList = document.getElementById("salesList");

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString() + " • " + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function loadSales(filter = "today") {
  const salesList = document.getElementById("salesList");
  if (!salesList) return;

  const sales = JSON.parse(localStorage.getItem("sales")) || [];
  const now = new Date();

  const filtered = sales.filter(sale => {
    const d = new Date(sale.date);

    if (filter === "today") {
      return d.toDateString() === now.toDateString();
    }

    if (filter === "week") {
      const weekAgo = new Date();
      weekAgo.setDate(now.getDate() - 7);
      return d >= weekAgo;
    }

    if (filter === "month") {
      return d.getMonth() === now.getMonth() &&
             d.getFullYear() === now.getFullYear();
    }

    return true;
  });

  renderSales(filtered.reverse());
}
function renderSales(data) {
  const salesList = document.getElementById("salesList");
  salesList.innerHTML = "";

  if (data.length === 0) {
    salesList.innerHTML = `<p class="text-gray-400 text-sm">No sales yet</p>`;
    return;
  }

  data.forEach(sale => {
    salesList.innerHTML += `
      <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm flex justify-between items-center">

        <div class="flex items-start gap-3">
          <div class="w-3 h-3 mt-2 rounded-full bg-green-500"></div>

          <div>
            <p class="text-sm font-semibold text-gray-900">₦${sale.amount.toLocaleString()}</p>
            <p class="text-xs text-gray-500 mt-1">${formatDate(sale.date)}</p>
            <p class="text-[10px] text-gray-400 mt-1">${sale.ref}</p>
          </div>
        </div>

        <span class="text-[10px] px-2 py-1 rounded-full bg-green-100 text-green-600">
          Completed
        </span>

      </div>
    `;
  });
}
const filterBtns = document.querySelectorAll(".filter-btn");

filterBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    
    // UI ACTIVE STATE
    filterBtns.forEach(b => {
      b.classList.remove("bg-red-600", "text-white");
      b.classList.add("bg-gray-100", "text-gray-600");
    });

    btn.classList.add("bg-red-600", "text-white");
    btn.classList.remove("bg-gray-100", "text-gray-600");

    const text = btn.textContent;

    if (text.includes("Today")) loadSales("today");
    else if (text.includes("Week")) loadSales("week");
    else if (text.includes("Month")) loadSales("month");
    else loadSales("all");

  });
});
window.addEventListener("DOMContentLoaded", () => {
  loadSales("today");
});
</script>
</body>
