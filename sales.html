<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Modern Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #f7f7f8;
    zoom: 0.9;
  }

  .heading-font {
    font-family: 'Space Grotesk', sans-serif;
  }
 
  /* Hide scrollbar for Chrome, Safari, Edge */
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }

  /* Hide scrollbar for Firefox */
  .no-scrollbar {
    scrollbar-width: none;
  }

  /* Hide scrollbar for IE & old Edge */
  .no-scrollbar {
    -ms-overflow-style: none;
  }
/* DEFAULT: mobile (bottom nav) */
.custom-nav {
  bottom: 0.25rem;
  top: auto;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 28rem;
  padding: 0 1rem;
}

.custom-nav-inner {
  flex-direction: row;
  justify-content: space-between;
}

/* DESKTOP: sidebar only above 1025px */
@media (min-width: 1200px) {
  .custom-nav {
    top: 50%;
    left: 1rem;
    bottom: 1;
    transform: translateY(-50%);
    width: auto;
    max-width: none;
    padding: 0;
  }

  .custom-nav-inner {
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
}
@media (max-width: 750px) {

body {
  zoom: 0.8;
}

}
</style>
</head>

<body>

<!-- MAIN WRAPPER (DESKTOP FEEL) -->
<div class="max-w-6xl mx-auto min-h-0">

<!-- NAVIGATION -->
<div class="fixed z-50 custom-nav">

  <div class="bg-white border border-gray-200 shadow-md rounded-2xl px-4 py-3 
              flex items-center custom-nav-inner">

    <!-- Dashboard -->
    <div id="nav-dashboard" class="flex flex-col items-center text-gray-400 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="home" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1 font-medium">Dashboard</span>
    </div>

    <!-- Redeem -->
    <div id="nav-redeem" class="flex flex-col items-center text-gray-400 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="ticket" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1 ">Redeem</span>
    </div>

    <!-- Sales -->
    <div id="nav-sales" class="flex flex-col items-center text-red-600 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1 font-medium">Sales</span>
    </div>

    <!-- Profile -->
    <div id="nav-profile" class="flex flex-col items-center text-gray-400 cursor-pointer md:hover:opacity-80 transition">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] mt-1 ">Profile</span>
    </div>

  </div>

</div>
  <!-- SALES PAGE -->
  <div id="salesPage" class=" max-w-6xl mx-auto px-6 pb-24">

    <!-- HEADER -->
    <div class="bg-white rounded-2xl p-5 border border-gray-100 flex items-center gap-3 mb-6">
  
      <div class="w-10 h-10 bg-red-50 text-red-600 flex items-center justify-center rounded-xl">
        <i data-lucide="bar-chart-3"></i>
      </div>
  
      <h2 class="text-lg font-semibold text-gray-900">Sales</h2>
  
    </div>
  
    <!-- FILTERS -->
    <div class="flex gap-3 mb-5 overflow-x-auto pb-1">
  
      <button class="filter-btn active-filter px-4 py-2 text-xs rounded-lg bg-red-600 text-white">Today</button>
  
      <button class="filter-btn px-4 py-2 text-xs rounded-lg bg-gray-100 text-gray-600">This Week</button>
  
      <button class="filter-btn px-4 py-2 text-xs rounded-lg bg-gray-100 text-gray-600">This Month</button>
  
      <button class="filter-btn px-4 py-2 text-xs rounded-lg bg-gray-100 text-gray-600">All Sales</button>
  
    </div>
  
    <!-- SALES LIST -->
    <div id="salesList" class="space-y-3">
  
      <!-- JS WILL FILL -->
  
    </div>
  
  </div>
    </div>
  
  </div>
  
  </div>

  <script>
    lucide.createIcons();
  </script>
<script>
    const navRedeem = document.getElementById("nav-redeem");
const navDashboard = document.getElementById("nav-dashboard");
const navSales = document.getElementById("nav-sales");
const navProfile = document.getElementById("nav-profile");

navRedeem?.addEventListener("click", () => {
  window.location.href = "redeem.html";
});

navDashboard?.addEventListener("click", () => {
  window.location.href = "dashboard.html";
});

navSales?.addEventListener("click", () => {
  window.location.href = "sales.html";
});

navProfile?.addEventListener("click", () => {
  window.location.href = "profile.html";
});
const salesList = document.getElementById("salesList");

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString() + " • " + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function loadSales(filter = "today") {
  const salesList = document.getElementById("salesList");
  if (!salesList) return;

  const sales = JSON.parse(localStorage.getItem("sales")) || [];
  const now = new Date();

  const filtered = sales.filter(sale => {
    const d = new Date(sale.date);

    if (filter === "today") {
      return d.toDateString() === now.toDateString();
    }

    if (filter === "week") {
      const weekAgo = new Date();
      weekAgo.setDate(now.getDate() - 7);
      return d >= weekAgo;
    }

    if (filter === "month") {
      return d.getMonth() === now.getMonth() &&
             d.getFullYear() === now.getFullYear();
    }

    return true;
  });

  renderSales(filtered.reverse());
}
function renderSales(data) {
  const salesList = document.getElementById("salesList");
  salesList.innerHTML = "";

  if (data.length === 0) {
    salesList.innerHTML = `<p class="text-gray-400 text-sm">No sales yet</p>`;
    return;
  }

  data.forEach(sale => {
    salesList.innerHTML += `
      <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm flex justify-between items-center">

        <div class="flex items-start gap-3">
          <div class="w-3 h-3 mt-2 rounded-full bg-green-500"></div>

          <div>
            <p class="text-sm font-semibold text-gray-900">₦${sale.amount.toLocaleString()}</p>
            <p class="text-xs text-gray-500 mt-1">${formatDate(sale.date)}</p>
            <p class="text-[10px] text-gray-400 mt-1">${sale.ref}</p>
          </div>
        </div>

        <span class="text-[10px] px-2 py-1 rounded-full bg-green-100 text-green-600">
          Completed
        </span>

      </div>
    `;
  });
}
const filterBtns = document.querySelectorAll(".filter-btn");

filterBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    
    // UI ACTIVE STATE
    filterBtns.forEach(b => {
      b.classList.remove("bg-red-600", "text-white");
      b.classList.add("bg-gray-100", "text-gray-600");
    });

    btn.classList.add("bg-red-600", "text-white");
    btn.classList.remove("bg-gray-100", "text-gray-600");

    const text = btn.textContent;

    if (text.includes("Today")) loadSales("today");
    else if (text.includes("Week")) loadSales("week");
    else if (text.includes("Month")) loadSales("month");
    else loadSales("all");

  });
});
window.addEventListener("DOMContentLoaded", () => {
  loadSales("today");
});
</script>
</body>
</html>
