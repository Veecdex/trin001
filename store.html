<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
*{font-family:'Plus Jakarta Sans',sans-serif}

body{
  background: #f8fafc;
  overflow-x: hidden;
}

/* scroll hide */
.scrollbar-hide{
  -ms-overflow-style:none;
  scrollbar-width:none;
}
.scrollbar-hide::-webkit-scrollbar{
  display:none;
}

html{
  scroll-behavior:smooth;
}

.gallery-item img{transition:.5s}
.gallery-item:hover img{transform:scale(1.05)}
</style>

</head>

<body>

<!-- APP -->
<!-- FIXED TOP AREA (BRIGHT THEME) -->
<div class="fixed top-0 left-0 w-full z-50 bg-white">

  <!-- HEADER -->
  <header class="max-w-7xl mx-auto px-5 py-4">

    <div class="flex items-center gap-3">

      <!-- LOGO -->
      <div class="flex items-center gap-2">

        <img src="images/men.jpg"
          class="w-9 h-9 rounded-xl object-cover shadow-sm"/>

        <div>
          <h1 class="text-lg font-black text-slate-800">
            Keyana Mart
          </h1>

          <p class="text-xs text-slate-500 hidden sm:block">
            Retail & Commerce
          </p>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="flex-1 relative ml-2">

        <i data-lucide="search"
          class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500">
        </i>

        <input id="searchInput"
          type="text"
          placeholder="Search products..."
          class="w-full h-11 rounded-2xl bg-white border border-slate-200 text-slate-700 placeholder:text-slate-400 pl-10 pr-3 text-sm outline-none shadow-sm focus:ring-2 focus:ring-rose-200"/>

        <!-- SEARCH DROPDOWN -->
        <div id="searchDropdown"
          class="hidden absolute top-12 left-0 w-full bg-white border border-slate-200 rounded-2xl shadow-xl p-2 z-50">

          <div class="text-xs text-slate-400 px-2 py-1">
            Suggestions
          </div>

          <div class="search-item px-3 py-2 hover:bg-slate-100 rounded-xl cursor-pointer text-slate-700">
            Wireless Headphones
          </div>

          <div class="search-item px-3 py-2 hover:bg-slate-100 rounded-xl cursor-pointer text-slate-700">
            Luxury Watch
          </div>

          <div class="search-item px-3 py-2 hover:bg-slate-100 rounded-xl cursor-pointer text-slate-700">
            Running Sneakers
          </div>

        </div>

      </div>

      <!-- ICONS -->
      <div class="flex items-center gap-2">

        <!-- DELIVERY -->
        <div class="relative">
          <button id="deliveryBtn"
            class="w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-700 flex items-center justify-center shadow-sm">

            <i data-lucide="truck"></i>
          </button>

          <div id="deliveryTooltip"
            class="hidden absolute top-12 right-0 w-72 bg-white border border-slate-200 rounded-2xl shadow-xl p-4 z-50 text-slate-700">

            <button id="closeTooltip"
              class="absolute top-2 right-3 text-slate-400">
              ✕
            </button>

            <h4 class="font-semibold">
              Delivery Info
            </h4>

            <p class="text-sm text-slate-500 mt-1">
              Fast delivery available after order confirmation.
            </p>

          </div>
        </div>

        <button class="w-10 h-10 rounded-xl bg-white border border-slate-200 text-slate-700 flex items-center justify-center shadow-sm">
          <i data-lucide="phone"></i>
        </button>

      </div>

    </div>

  </header>

  <!-- HERO (BRIGHT BUT PREMIUM) -->
  <div class="max-w-7xl mx-auto px-5 pt-3 pb-4 text-center">

    <div class="flex items-center justify-center gap-2">

      <i data-lucide="sparkles"
        class="w-5 h-5 text-rose-400">
      </i>

      <h2 class="text-xl sm:text-2xl font-bold text-slate-800">
        Welcome to Keyana
      </h2>

      <i data-lucide="shopping-bag"
        class="w-5 h-5 text-amber-500">
      </i>

    </div>

    <p class="text-sm text-slate-500 mt-2">
      See what’s available and start shopping
    </p>

  </div>

  <!-- CATEGORIES -->
  <div class="max-w-7xl mx-auto px-5 pb-4">

    <div class="flex justify-center">

      <div class="flex gap-2 overflow-x-auto scrollbar-hide py-1">

        <button class="px-4 py-2 rounded-full bg-slate-900 text-white text-sm whitespace-nowrap font-medium">
          All
        </button>

        <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-700 text-sm whitespace-nowrap">
          Electronics
        </button>

        <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-700 text-sm whitespace-nowrap">
          Fashion
        </button>

        <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-700 text-sm whitespace-nowrap">
          Shoes
        </button>

        <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-700 text-sm whitespace-nowrap">
          Accessories
        </button>

        <button class="px-4 py-2 rounded-full bg-white border border-slate-200 text-slate-700 text-sm whitespace-nowrap">
          Deals 🔥
        </button>

      </div>

    </div>

    <!-- WAVE -->
    <div class="absolute -bottom-8 left-0 w-full overflow-hidden leading-none">
      <svg viewBox="0 0 500 60" preserveAspectRatio="none"
           class="w-full h-12">
        <path d="M0,0 C150,60 350,60 500,0 L500,60 L0,60 Z"
              fill="#f8fafc"></path>
      </svg>
    </div>

  </div>

</div>



<main class="max-w-7xl mx-auto p-3 pt-[250px]">
 
<!-- PRODUCTS -->
<section>

  <!-- NO GAP GRID (joined images feel) -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-0">

    <!-- PRODUCT -->
    <div class="gallery-item relative overflow-hidden">

      <!-- CENTER SHOP BADGE -->
      <div class="absolute inset-0 flex items-center justify-center z-10">
        <div class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 shadow-lg">
          <i data-lucide="shopping-cart" class="w-4 h-4"></i>
          <span class="text-sm font-semibold">Shop</span>
        </div>
      </div>

<!-- FLOATING CART -->
<button class="fixed bottom-6 right-6 bg-slate-900 text-white px-4 py-3 rounded-2xl shadow-xl flex items-center gap-2">
<i data-lucide="shopping-cart"></i>
<span id="cartCount">2</span>
</button>

<script>
lucide.createIcons();

/* DELIVERY */
const deliveryBtn=document.getElementById("deliveryBtn");
const deliveryTooltip=document.getElementById("deliveryTooltip");
const closeTooltip=document.getElementById("closeTooltip");

deliveryBtn.onclick=()=>deliveryTooltip.classList.toggle("hidden");
closeTooltip.onclick=()=>deliveryTooltip.classList.add("hidden");

/* SEARCH DROPDOWN */
const searchInput=document.getElementById("searchInput");
const searchDropdown=document.getElementById("searchDropdown");

searchInput.addEventListener("focus",()=>{
searchDropdown.classList.remove("hidden");
});

searchInput.addEventListener("input",()=>{
searchDropdown.classList.remove("hidden");
});

document.addEventListener("click",(e)=>{
if(!e.target.closest("#searchInput")&&!e.target.closest("#searchDropdown")){
searchDropdown.classList.add("hidden");
}
});
</script>
