<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Email • Wiesel</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
    font-family:'Inter',sans-serif;
    background:#FAF8F4;
}
</style>

</head>
<body>

<div class="min-h-screen flex items-center justify-center px-6">

    <div class="w-full max-w-md text-center">

        <!-- LOGO -->
        <div class="flex justify-center mb-10">
            <img src="WIESEL LOGO.png"
                 class="h-10 object-contain"
                 alt="Wiesel">
        </div>

        <!-- ICON -->
        <div class="w-16 h-16 mx-auto rounded-2xl bg-white shadow-sm border border-neutral-200 flex items-center justify-center mb-6">

            <i data-lucide="mail-check"
               class="w-8 h-8"></i>

        </div>

        <!-- TITLE -->
        <h1 class="text-3xl font-semibold tracking-tight mb-3">
            Check your inbox
        </h1>

        <!-- MESSAGE -->
        <p class="text-neutral-500 leading-relaxed text-sm">

            We just sent a verification link to

            <span id="userEmail"
                  class="font-medium text-black">
                john@example.com
            </span>

            <br><br>

            Click the link in your email to verify your account and continue to Wiesel.

        </p>

        <!-- INFO CARD -->
        <div class="mt-8 bg-white border border-neutral-200 rounded-2xl p-4 text-left">

            <div class="flex gap-3">

                <i data-lucide="info"
                   class="w-4 h-4 mt-0.5 text-neutral-500"></i>

                <div class="text-xs text-neutral-500 leading-relaxed">

                    Didn't receive the email?

                    Check your spam folder or wait a few minutes before requesting another verification email.

                </div>

            </div>

        </div>

        <!-- BUTTONS -->
        <div class="mt-8 space-y-3">

            <button
            class="w-full h-11 bg-black text-white rounded-xl text-sm hover:opacity-90 transition">

                Resend Verification Email

            </button>

            <a href="signin.html"
               class="block w-full h-11 leading-[44px] border border-neutral-200 rounded-xl text-sm bg-white hover:bg-neutral-50 transition">

                Sign In

            </a>

        </div>

    </div>

</div>

<script>

lucide.createIcons();

/*
Get email from URL

verify.html?email=test@gmail.com
*/

const params = new URLSearchParams(window.location.search);

const email =
params.get("email") || "your email address";

document.getElementById("userEmail").textContent = email;

</script>

</body>
</html>
